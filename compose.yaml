# Base configuration with common fields (versions, ports, volumes).
name: drap

services:
  postgres:
    pull_policy: build
    build: ./docker/postgres
    ports:
      - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql/data
    networks:
      - database
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready']
      interval: 5s
      timeout: 5s
      retries: 5

  inngest:
    image: inngest/inngest:v1.17.9
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - queue
    ports:
      - 8288:8288
    restart: always

  o2:
    pull_policy: build
    build: ./docker/openobserve
    environment:
      ZO_DATA_DIR: /data
    ports:
      - 5080:5080
    volumes:
      - open-observe:/data
    networks:
      - telemetry
    restart: always
    healthcheck:
      test: ['CMD', '/httpget', 'http://localhost:5080/healthz']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  open-observe:
  postgres:

networks:
  database:
  queue:
  telemetry:
